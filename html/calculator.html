<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator</title>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #1e1e2f;
      font-family: Arial, sans-serif;
    }

    .calculator {
      background: #2c2c3e;
      padding: 20px;
      border-radius: 15px;
      width: 260px;
    }

    input {
      width: 100%;
      height: 60px;
      font-size: 24px;
      margin-bottom: 15px;
      text-align: right;
      padding: 10px;
      border: none;
      border-radius: 10px;
      outline: none;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      height: 50px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #444;
      color: white;
    }

    button:hover {
      background: #666;
    }

    .zero {
      grid-column: span 2;
    }
  </style>
</head>

<body>

<div class="calculator">
  <input type="text" placeholder="0">

  <div class="buttons">
    <button>AC</button>
    <button>%</button>
    <button>/</button>
    <button>*</button>

    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button>-</button>

    <button>4</button>
    <button>5</button>
    <button>6</button>
    <button>+</button>

    <button>1</button>
    <button>2</button>
    <button>3</button>
    <button>=</button>

    <button class="zero">0</button>
    <button>.</button>
  </div>
</div>

<script src="calculator.js"></script>
</body>
</html>
