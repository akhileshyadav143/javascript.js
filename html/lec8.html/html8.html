<!DOCTYPE html>
<html lang="en">
<head>

    <title>promicess</title>
</head>
<body>
    <script> 
        function step1(){
            return new Promise(( res,rej)=>{
                setTimeout(()=>{
                    console.log("selected");
                    res()
                },5000)
            })
        }

        function step2(){
            return new Promise(( res,rej)=>{
                setTimeout(()=>{
                    console.log("captionadd");
                    res()
                },4000)
            })
        }

    async   function call(){
            await step1()
            console.log("hiiiii");
            
            await  step2()
        }
        call()
    </script>

</body>
